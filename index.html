<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Portföy Pro Live</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,700&f[]=cabinet-grotesk@700&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0b0e11; --panel: #151a21; --primary: #00d2ff; --text: #f0f2f5; --muted: #94a3b8; --border: #2d333d; --success: #00c805; --error: #ff3b30; }
    body { margin: 0; font-family: 'Satoshi', sans-serif; background: var(--bg); color: var(--text); }
    #lock-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 10000; }
    .lock-card { background: var(--panel); padding: 3rem; border-radius: 2rem; border: 1px solid var(--border); text-align: center; width: 320px; }
    #app-content { display: none; padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
    .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--panel); padding: 1.2rem; border-radius: 1.2rem; border: 1px solid var(--border); }
    .stat-val { font-size: 1.8rem; font-weight: 700; font-family: 'Cabinet Grotesk'; color: var(--primary); }
    .main-layout { display: grid; grid-template-columns: 320px 1fr; gap: 1.5rem; }
    .panel { background: var(--panel); border-radius: 1.2rem; padding: 1.2rem; border: 1px solid var(--border); }
    input, select { background: #0b0e11; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; width: 100%; margin-top: 5px; box-sizing: border-box; }
    .btn { cursor: pointer; border: none; font-weight: 600; padding: 12px; border-radius: 10px; transition: 0.2s; width: 100%; }
    .btn-main { background: var(--primary); color: #000; margin-top: 1rem; }
    .btn-update { background: var(--success); color: #000; margin-top: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th { text-align: left; color: var(--muted); padding: 10px 5px; border-bottom: 1px solid var(--border); }
    td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .up { color: var(--success); } .down { color: var(--error); }
    .badge { padding: 2px 6px; border-radius: 4px; font-weight: 700; font-size: 0.75rem; }
    @media (max-width: 900px) { .main-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-card">
        <h1 style="font-family:'Cabinet Grotesk'; margin:0">Giriş</h1>
        <input type="password" id="passInput" placeholder="Şifre" autofocus>
        <button class="btn btn-main" onclick="checkPass()">Paneli Aç</button>
    </div>
</div>

<div id="app-content">
    <header style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:1.5rem;">
        <h1 style="font-family:'Cabinet Grotesk'; margin:0; font-size:2rem;">Portföy <span style="color:var(--primary)">Live</span></h1>
        <div style="text-align:right;">
            <input type="password" id="apiKeyInput" placeholder="Finnhub API Key" style="width:150px; font-size:0.7rem; margin:0">
            <button class="btn btn-update" onclick="fetchLivePrices()" style="width:150px; font-size:0.7rem; padding:5px;">Fiyatları Güncelle ↻</button>
        </div>
    </header>

    <div class="summary-grid">
        <div class="stat-card">
            <div style="color:var(--muted); font-size:0.8rem">Toplam Maliyet</div>
            <div class="stat-val" id="totalCost">$0</div>
        </div>
        <div class="stat-card">
            <div style="color:var(--muted); font-size:0.8rem">Güncel Değer</div>
            <div class="stat-val" id="liveValue">$0</div>
        </div>
        <div class="stat-card">
            <div style="color:var(--muted); font-size:0.8rem">Kâr / Zarar</div>
            <div class="stat-val" id="totalPnl">$0</div>
        </div>
        <div class="stat-card">
            <div style="color:var(--muted); font-size:0.8rem">Nakit</div>
            <div class="stat-val" id="cashDisplay" style="color:#fff">$0</div>
        </div>
    </div>

    <div class="main-layout">
        <aside class="panel">
            <h3>İşlem Ekle</h3>
            <form id="tradeForm">
                <input type="text" id="symbol" placeholder="Sembol (AAPL, BTC-USD)" required>
                <select id="type"><option value="BUY">Alış</option><option value="SELL">Satış</option></select>
                <input type="number" id="qty" step="any" placeholder="Miktar" required>
                <input type="number" id="price" step="any" placeholder="Fiyat" required>
                <button type="submit" class="btn btn-main">Ekle</button>
            </form>
            <div style="margin-top:1.5rem;">
                <input type="number" id="cashUpdate" placeholder="Nakit Ayarla">
                <button class="btn" onclick="updateCash()" style="background:var(--border); color:white; margin-top:5px;">Bakiyeyi Set Et</button>
            </div>
        </aside>

        <main class="panel">
            <h3>Varlıklarım (Canlı)</h3>
            <table>
                <thead>
                    <tr>
                        <th>Varlık</th>
                        <th>Adet</th>
                        <th>Maliyet</th>
                        <th>Güncel</th>
                        <th>Değer</th>
                        <th>K/Z %</th>
                    </tr>
                </thead>
                <tbody id="assetTable"></tbody>
            </table>
        </main>
    </div>
</div>

<script>
    const SECRET_PASS = "1234";
    let store = JSON.parse(localStorage.getItem('live_portfolio')) || { trades: [], cash: 0, apiKey: '' };
    let livePrices = {};

    function checkPass() {
        if(document.getElementById('passInput').value === SECRET_PASS) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('apiKeyInput').value = store.apiKey || '';
            render();
        } else { alert("Yanlış!"); }
    }

    async function fetchLivePrices() {
        const key = document.getElementById('apiKeyInput').value;
        if(!key) return alert("Önce Finnhub API Key gir!");
        store.apiKey = key;
        
        const symbols = [...new Set(store.trades.map(t => t.symbol))];
        for(let s of symbols) {
            try {
                // Finnhub formatı hisseler için direkt, crypto için BINANCE:BTCUSDT gibi olabilir ama genelde 'BTC-USD' de çözer
                const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${s.toUpperCase()}&token=${key}`);
                const data = await res.json();
                if(data.c) livePrices[s] = data.c;
            } catch(e) { console.error(s + " çekilemedi"); }
        }
        render();
    }

    function render() {
        const assets = {};
        store.trades.forEach(t => {
            if(!assets[t.symbol]) assets[t.symbol] = { qty: 0, totalCost: 0 };
            if(t.type === 'BUY') {
                assets[t.symbol].qty += t.qty;
                assets[t.symbol].totalCost += (t.qty * t.price);
            } else {
                // Satışta ortalama maliyet değişmez, sadece miktar ve ona oranla totalCost düşer
                const avgBefore = assets[t.symbol].totalCost / assets[t.symbol].qty;
                assets[t.symbol].qty -= t.qty;
                assets[t.symbol].totalCost = assets[t.symbol].qty * avgBefore;
            }
        });

        const tbody = document.getElementById('assetTable');
        tbody.innerHTML = '';
        let totalCostAll = 0; let totalLiveValueAll = 0;

        Object.keys(assets).forEach(s => {
            const a = assets[s];
            if(a.qty <= 0) return;
            
            const avgPrice = a.totalCost / a.qty;
            const currentPrice = livePrices[s] || avgPrice;
            const liveValue = a.qty * currentPrice;
            const pnlPercent = ((currentPrice - avgPrice) / avgPrice) * 100;
            
            totalCostAll += a.totalCost;
            totalLiveValueAll += liveValue;

            tbody.innerHTML += `<tr>
                <td><strong>${s}</strong></td>
                <td>${a.qty.toFixed(4)}</td>
                <td>$${avgPrice.toFixed(2)}</td>
                <td>$${currentPrice.toFixed(2)}</td>
                <td>$${liveValue.toFixed(2)}</td>
                <td class="${pnlPercent >= 0 ? 'up' : 'down'} font-weight:700">
                    ${pnlPercent >= 0 ? '▲' : '▼'} ${Math.abs(pnlPercent).toFixed(2)}%
                </td>
            </tr>`;
        });

        document.getElementById('totalCost').innerText = '$' + totalCostAll.toLocaleString();
        document.getElementById('liveValue').innerText = '$' + totalLiveValueAll.toLocaleString();
        const diff = totalLiveValueAll - totalCostAll;
        document.getElementById('totalPnl').innerText = '$' + diff.toLocaleString();
        document.getElementById('totalPnl').className = 'stat-val ' + (diff >= 0 ? 'up' : 'down');
        document.getElementById('cashDisplay').innerText = '$' + store.cash.toLocaleString();
        
        localStorage.setItem('live_portfolio', JSON.stringify(store));
    }

    document.getElementById('tradeForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const t = {
            symbol: document.getElementById('symbol').value.toUpperCase().trim(),
            type: document.getElementById('type').value,
            qty: parseFloat(document.getElementById('qty').value),
            price: parseFloat(document.getElementById('price').value)
        };
        store.cash += (t.type === 'BUY' ? -(t.qty * t.price) : (t.qty * t.price));
        store.trades.push(t);
        render();
        e.target.reset();
    });

    function updateCash() {
        store.cash = parseFloat(document.getElementById('cashUpdate').value) || 0;
        render();
    }

    function logout() { location.reload(); }
</script>
</body>
</html>
